<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault Scrambler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 0; background-color: #0f0f0f; color: #f0f0f0; }
        
        .progress-bar { width: 100%; background: #2d2d2d; height: 8px; display: none; position: fixed; top: 0; left: 0; z-index: 101; }
        #fill { width: 0%; height: 100%; background: #9c88ff; transition: width 0.1s; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #0f0f0f; z-index: 100; margin-top: 8px; height: 60px; }
        .tabs { display: flex; gap: 20px; height: 100%; align-items: center; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; font-weight: bold; padding: 10px 0; border-bottom: 2px solid transparent; border-radius: 0; transition: 0.2s; }
        .tab-btn.active { color: #9c88ff; border-bottom: 2px solid #9c88ff; }
        
        .top-right { display: flex; align-items: center; gap: 15px; }
        #status { font-size: 0.8rem; color: #9c88ff; font-family: monospace; margin: 0; }
        
        .panel { background-color: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 20px; }
        .view-content { display: none; }
        .view-content.active { display: block; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .canvas-wrapper { position: relative; margin-top: 20px; text-align: center; min-height: 200px; display: flex; justify-content: center; align-items: center; background: #111; border-radius: 8px; overflow: hidden; }
        canvas { max-width: 100%; border-radius: 8px; display: none; }
        #privacyOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2d2d2d; border-radius: 8px; display: none; justify-content: center; align-items: center; border: 2px dashed #9c88ff; color: #9c88ff; font-weight: bold; z-index: 10; }
        
        input, button { padding: 14px; border-radius: 6px; border: none; font-size: 1rem; }
        input[type="text"], input[type="password"] { background: #2d2d2d; color: #fff; border: 1px solid #444; flex-grow: 1; transition: border-color 0.3s; outline: none; }
        
        input.strength-weak { border: 1px solid #d63031 !important; }
        input.strength-medium { border: 1px solid #f1c40f !important; }
        input.strength-strong { border: 1px solid #2ecc71 !important; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { background-color: #9c88ff; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #hideBtn { background-color: #444; }
        #clearBtn { background-color: #d63031; padding: 8px 16px; font-size: 0.9rem; }
        #downloadBtn { background-color: #2ecc71; }
        #exportLogBtn { background-color: #444; margin-bottom: 10px; }
        
        .opt-row { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; color: #bbb; flex-wrap: wrap; }
        #queueList { margin-top: 15px; font-size: 0.8rem; background: #111; padding: 10px; border-radius: 6px; max-height: 120px; overflow-y: auto; display: none; }
        
        #auditLog { font-family: 'Courier New', monospace; font-size: 0.85rem; color: #aaa; background: #0a0a0a; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #1a1a1a; padding-bottom: 3px; }
        .log-time { color: #555; }
        .log-action { color: #9c88ff; font-weight: bold; }

        #timerDisplay { font-size: 0.8rem; color: #d63031; font-weight: bold; }
        .panic-info { font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
    <div class="progress-bar" id="pb"><div id="fill"></div></div>
    
    <div class="top-bar">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('vault')">VAULT</button>
            <button class="tab-btn" onclick="switchTab('logs')">AUDIT LOG</button>
        </div>
        <div class="top-right">
            <p id="status">Ready</p>
            <span class="panic-info">[ESC] PANIC</span>
            <span id="timerDisplay">05:00</span>
            <button id="clearBtn">Clear Session</button>
        </div>
    </div>

    <div class="panel">
        <!-- Vault View -->
        <div id="vaultView" class="view-content active">
            <div class="controls">
                <label>1. Select Image(s), Video, Audio, or Text</label>
                <input type="file" id="upload" accept="image/*, video/*, audio/*, text/*" multiple>
                <label>2. Settings</label>
                <div class="btn-group">
                    <input type="password" id="password" placeholder="Secret phrase..." autocomplete="off">
                    <button id="hideBtn">Hide Preview</button>
                    <button id="analyzeImageBtn" onclick="analyzeCanvasImage()">Analyze</button>
                </div>
                <div class="opt-row">
                    <div style="display:flex; gap:5px;"><input type="checkbox" id="modeType"><label for="modeType">Alternative (Compression Compatible)</label></div>
                    <div style="display:flex; gap:5px;"><input type="checkbox" id="modeType2"><label for="modeType2">Quantum (Compression Incompatible)</label></div>
                    <div style="display:flex; gap:5px;"><input type="checkbox" id="modeType3"><label for="modeType3">Ultra Quantum (Compression Incompatible)</label></div>
                    <div style="display:flex; gap:5px;"><input type="checkbox" id="secureFn"><label for="secureFn">Secure Names</label></div>
                    <div style="display:flex; gap:5px;"><input type="checkbox" id="autoDl"><label for="autoDl">Auto-Download</label></div>
                    <div style="display:flex; gap:5px; color:#555;"><input type="checkbox" checked disabled><label>Strip EXIF</label></div>
                </div>
                <div class="btn-group">
                    <button id="scrambleBtn" style="flex:1">Lock</button>
                    <button id="unscrambleBtn" style="flex:1">Unlock</button>
                </div>
                <div id="queueList"></div>
                <button id="downloadBtn" disabled>Download All</button>
            </div>
            <div class="canvas-wrapper">
                <div id="privacyOverlay">IMAGE HIDDEN</div>
                <p id="placeholderText" style="color:#444">Preview area</p>
                <canvas id="cvs"></canvas>
            </div>
        </div>

        <!-- Logs View -->
        <div id="logsView" class="view-content">
            <button id="exportLogBtn">Export Log (.txt)</button>
            <div id="auditLog">
                <div class="log-entry"><span class="log-time">[System]</span> Session started.</div>
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d', { willReadFrequently: true });
        const passInput = document.getElementById('password'), downloadBtn = document.getElementById('downloadBtn'), status = document.getElementById('status');
        const pb = document.getElementById('pb'), fill = document.getElementById('fill'), hideBtn = document.getElementById('hideBtn'), overlay = document.getElementById('privacyOverlay');
        const queueList = document.getElementById('queueList'), clearBtn = document.getElementById('clearBtn'), secureFn = document.getElementById('secureFn');
        const autoDl = document.getElementById('autoDl'), placeholder = document.getElementById('placeholderText'), auditLog = document.getElementById('auditLog');
        const timerDisplay = document.getElementById('timerDisplay'), exportBtn = document.getElementById('exportLogBtn');
        const modeType = document.getElementById('modeType'), modeType2 = document.getElementById('modeType2'), modeType3 = document.getElementById('modeType3');

        modeType.addEventListener('change', function() {
            modeType2.checked = false;
            modeType3.checked = false;
        });
        modeType2.addEventListener('change', function() {
            modeType.checked = false;
            modeType3.checked = false;
        });
        modeType3.addEventListener('change', function() {
            modeType.checked = false;
            modeType2.checked = false;
        });

        let processedFiles = [], destructTime = 300;
        var videoFile = null;
        var audioFile = null;
        var textFile = null;

        function switchTab(view) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(view + 'View').classList.add('active');
        }

        function logActivity(action, fileName) {
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-action">${action}</span>: ${fileName}`;
            auditLog.prepend(entry);
        }

        exportBtn.onclick = () => {
            const blob = new Blob([auditLog.innerText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `audit_log_${Date.now()}.txt`;
            a.href = URL.createObjectURL(blob);
            a.click();
        };

        passInput.oninput = () => {
            const val = passInput.value;
            passInput.className = '';
            if (!val) return;
            let score = (val.length > 8) + /[A-Z]/.test(val) + /[0-9]/.test(val) + /[^A-Za-z0-9]/.test(val);
            if (score <= 1) passInput.classList.add('strength-weak');
            else if (score <= 3) passInput.classList.add('strength-medium');
            else passInput.classList.add('strength-strong');
        };

        const panicClear = () => location.reload();
        clearBtn.addEventListener('click', (e) => panicClear());
        window.addEventListener('keydown', (e) => e.key === "Escape" && panicClear());
        window.onclick = window.onkeypress = window.onmousemove = () => destructTime = 300;

        setInterval(() => {
            destructTime--;
            let mins = Math.floor(destructTime / 60), secs = destructTime % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (destructTime <= 0) panicClear();
        }, 1000);

        hideBtn.onclick = () => {
            const isHidden = overlay.style.display === 'flex';
            overlay.style.display = isHidden ? 'none' : 'flex';
            hideBtn.innerText = isHidden ? "Hide Preview" : "Show Preview";
        };

        upload.onchange = async (e) => {
            videoFile = null;
            audioFile = null;
            textFile = null;
            const files = e.target.files;
            if (files.length === 1) {
                const mimeType = files[0].type;
                if(mimeType.startsWith('image/')){
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            cvs.width = img.width; cvs.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            cvs.style.display = 'block'; placeholder.style.display = 'none';
                            status.innerText = "Ready";
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(files[0]);
                } else if (mimeType.startsWith('video/')){
                    videoFile = files[0];
                } else if (mimeType.startsWith('audio/')) {
                    audioFile = files[0];
                } else if (mimeType.startsWith('text/')) {
                    textFile = files[0];
                }
            } else {
                cvs.style.display = 'none'; placeholder.style.display = 'block';
                placeholder.innerText = `${files.length} images selected.`;
                status.innerText = "Bulk Ready";
            }
        };

        /*
        // updated hashPassword methodology to make quantum resistant
        // in accordance with Gemini Preliminary Analysis PDF
        async function hashPassword(text) {
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hex = Array.from(new Uint8Array(hashBuffer)).slice(0, 8).map(b => b.toString(16).padStart(2, '0')).join('');
            return BigInt("0x" + hex);
        }*/

        async function hashPassword(text) {
            const msgUint8 = new TextEncoder().encode(text);
            return await crypto.subtle.digest('SHA-256', msgUint8); 
        }
        
        /*
        // updated createPRNG methodology to make quantum resistant
        // in accordance with Gemini Preliminary Analysis PDF
        function createPRNG(numericSeed) {
            let seed = Number(numericSeed % 4294967296n) | 0;
            return function() {
                seed = (seed + 0x9e3779b9) | 0;
                let t = seed ^ (seed >>> 16);
                t = Math.imul(t, 0x21f0aaad);
                t = t ^ (t >>> 15);
                t = Math.imul(t, 0x735a2d97);
                return ((t = t ^ (t >>> 15)) >>> 0) / 4294967296;
            };
        }
        */
        // here is updated createPRNG
        function createPRNG(hashBuffer) {
            const state = new Uint32Array(hashBuffer); 
            let counter = 0;
            function mix(a, b, c, d) {
                a = (a + b) | 0; d ^= a; d = (d << 16) | (d >>> 16);
                c = (c + d) | 0; b ^= c; b = (b << 12) | (b >>> 20);
                a = (a + b) | 0; d ^= a; d = (d << 8) | (d >>> 24);
                c = (c + d) | 0; b ^= c; b = (b << 7) | (b >>> 25);
                return [a, b, c, d];
            }
            return function() {
                counter++;
                let working = new Uint32Array(state);
                working[0] ^= counter;
                for (let i = 0; i < 10; i++) {
                    [working[0], working[1], working[2], working[3]] = mix(working[0], working[1], working[2], working[3]);
                    [working[4], working[5], working[6], working[7]] = mix(working[4], working[5], working[6], working[7]);
                }
                return (working[0] >>> 0) / 4294967296;
            };
        }

        async function processImage(file, seed, isUnscramble) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = async () => {
                        // start of encryption/decryption methods
                        // 3 types: default, alternate, and quantum resistant
                        // pros and cons for each method, depending on use case
                        if(modeType.checked != true && modeType2.checked != true && modeType3.checked != true){
                            // DEFAULT METHOD
                            // current implementation has pixel perfect re-replication
                            // the will become the default method with a toggle to allow
                            // switching to less perfect method that reduces size below 
                            // an even compressed image
                            const tCvs = document.createElement('canvas'), tCtx = tCvs.getContext('2d', {willReadFrequently:true});
                            tCvs.width = img.width; tCvs.height = img.height; tCtx.drawImage(img, 0, 0);
                            const len = img.width * img.height;
                            const pixelData = tCtx.getImageData(0, 0, img.width, img.height);
                            const data = pixelData.data;
                            const temp = new Uint8ClampedArray(data); 
                            const prng = createPRNG(seed);
                            const map = new Int32Array(len);
                            for(let i=0; i<len; i++) map[i]=i;
                            for(let i=len-1; i>0; i--) {
                                const j = Math.floor((prng.next ? prng.next().value : prng()) * (i + 1));
                                [map[i], map[j]] = [map[j], map[i]];
                            }
                            for(let i=0; i<len; i+=150000) {
                                const end = Math.min(i + 150000, len);
                                for(let j=i; j<end; j++) {
                                    const s = (isUnscramble ? map[j] : j) * 4;
                                    const d = (isUnscramble ? j : map[j]) * 4;
                                    data[d]     = temp[s];     
                                    data[d + 1] = temp[s + 1]; 
                                    data[d + 2] = temp[s + 2]; 
                                    data[d + 3] = temp[s + 3];
                                }
                                await new Promise(r => setTimeout(r, 0));
                            }
                            tCtx.putImageData(pixelData, 0, 0);
                            //const resData = tCvs.toDataURL('image/png');
                            const compressedBlob = await compressImageLosslessWithQuantization(tCvs);
                            const resData = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onloadend = () => resolve(reader.result);
                                reader.readAsDataURL(compressedBlob);
                            });
                            let fn = secureFn.checked ? Math.random().toString(36).substr(2,12)+".png" : (isUnscramble?'dec_':'enc_')+file.name;
                            processedFiles.push({ name: fn, data: resData });
                            if(autoDl.checked) {
                                const a = document.createElement('a'); a.download = fn; a.href = resData; a.click();
                            }
                            if(upload.files.length === 1) {
                                cvs.width = img.width; cvs.height = img.height;
                                ctx.putImageData(pixelData, 0, 0); 
                                cvs.style.display = 'block';
                                placeholder.style.display = 'none';
                            }
                            logActivity(isUnscramble ? 'Unlocked' : 'Locked', file.name);
                            resolve();
                        } else if (modeType.checked == true && modeType2.checked != true && modeType3.checked != true) {
                            // ALTERNATIVE METHOD
                            // this implementation does not have pixel perfect re-replication
                            // and is not a problem with color diffusion, as it represents
                            // and entirely different methodology of block-chunking pixels
                            // to utilize nearest neighbors to allow for better compression
                            const tCvs = document.createElement('canvas');
                            const tCtx = tCvs.getContext('2d');
                            tCvs.width = img.width;
                            tCvs.height = img.height;
                            const blockSize = 8; 
                            const cols = Math.floor(img.width / blockSize);
                            const rows = Math.floor(img.height / blockSize);
                            const totalBlocks = cols * rows;
                            const blockMap = new Int32Array(totalBlocks);
                            for (let i = 0; i < totalBlocks; i++) blockMap[i] = i;
                            const prng = createPRNG(seed);
                            for (let i = totalBlocks - 1; i > 0; i--) {
                                const j = Math.floor((prng.next ? prng.next().value : prng()) * (i + 1));
                                [blockMap[i], blockMap[j]] = [blockMap[j], blockMap[i]];
                            }
                            for (let i = 0; i < totalBlocks; i++) {
                                const sIdx = isUnscramble ? blockMap[i] : i;
                                const dIdx = isUnscramble ? i : blockMap[i];
                                const sx = (sIdx % cols) * blockSize;
                                const sy = Math.floor(sIdx / cols) * blockSize;
                                const dx = (dIdx % cols) * blockSize;
                                const dy = Math.floor(dIdx / cols) * blockSize;
                                tCtx.drawImage(img, sx, sy, blockSize, blockSize, dx, dy, blockSize, blockSize);
                            }
                            //const resData = tCvs.toDataURL('image/webp', 1.0); 
                            const compressedBlob = await compressImageAdaptive(tCvs);
                            const resData = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onloadend = () => resolve(reader.result);
                                reader.readAsDataURL(compressedBlob);
                            });
                            let fn = secureFn.checked ? Math.random().toString(36).substr(2,12)+".png" : (isUnscramble?'dec_':'enc_')+file.name;
                            processedFiles.push({ name: fn, data: resData });
                            if (upload.files.length === 1) {
                                cvs.width = img.width;
                                cvs.height = img.height;
                                ctx.drawImage(tCvs, 0, 0); 
                                cvs.style.display = 'block';
                                placeholder.style.display = 'none';
                            }
                            logActivity(isUnscramble ? 'Unlocked' : 'Locked', file.name);
                            resolve();
                        } else if (modeType.checked != true && modeType2.checked == true && modeType3.checked != true){
                            // QUANTUM METHOD
                            // this implementation has near pixel perfect re-replication in most cases
                            // it represents an entirely different methodology of block-chunking pixels
                            // it seems to be quantum proof
                            const tCvs = document.createElement('canvas'), 
                                tCtx = tCvs.getContext('2d', {willReadFrequently:true});
                            tCvs.width = img.width; 
                            tCvs.height = img.height;
                            tCtx.drawImage(img, 0, 0);
                            const w = img.width, h = img.height;
                            const block_size = 8;
                            const cols = Math.ceil(w / block_size);
                            const rows = Math.ceil(h / block_size);
                            const numBlocks = cols * rows;
                            const pixelData = tCtx.getImageData(0, 0, w, h);
                            const data = pixelData.data;
                            const getIdx = (x, y) => (Math.min(y, h - 1) * w + Math.min(x, w - 1)) * 4;
                            const uniqueChunks = [];
                            const chunkMap = new Int32Array(numBlocks);
                            const hashMap = new Map();
                            for (let i = 0; i < numBlocks; i++) {
                                const by = Math.floor(i / cols) * block_size;
                                const bx = (i % cols) * block_size;
                                let key = "";
                                for (let y = 0; y < block_size; y++) {
                                    for (let x = 0; x < block_size; x++) {
                                        const p = getIdx(bx + x, by + y);
                                        key += data[p] + "," + data[p+1] + "," + data[p+2] + "," + data[p+3] + "|";
                                    }
                                }
                                if (!hashMap.has(key)) {
                                    const block = new Uint8ClampedArray(block_size * block_size * 4);
                                    let bIdx = 0;
                                    for (let y = 0; y < block_size; y++) {
                                        for (let x = 0; x < block_size; x++) {
                                            const p = getIdx(bx + x, by + y);
                                            block[bIdx++] = data[p];
                                            block[bIdx++] = data[p+1];
                                            block[bIdx++] = data[p+2];
                                            block[bIdx++] = data[p+3];
                                        }
                                    }
                                    hashMap.set(key, uniqueChunks.length);
                                    uniqueChunks.push(block);
                                }
                                chunkMap[i] = hashMap.get(key);
                            }
                            // enhanced hilbert mapping ---
                            // calculate 'n' based on the largest dimension to ensure the curve covers the whole area
                            const n = Math.pow(2, Math.ceil(Math.log2(Math.max(cols, rows))));
                            function d2xy(n, d) {
                                let x = 0, y = 0, t = d;
                                for (let s = 1; s < n; s <<= 1) {
                                    let rx = 1 & (Math.floor(t / 2));
                                    let ry = 1 & (t ^ rx);
                                    if (ry === 0) {
                                        if (rx === 1) {
                                            x = s - 1 - x;
                                            y = s - 1 - y;
                                        }
                                        let temp = x; x = y; y = temp;
                                    }
                                    x += s * rx;
                                    y += s * ry;
                                    t = Math.floor(t / 4);
                                }
                                return { x, y };
                            }
                            // process all blocks ---
                            const colorPrng = createPRNG(seed);
                            const rotPrng = createPRNG(seed);
                            // pre-generate configs for EVERY block to ensure perfect reversal
                            const fractalConfigs = new Array(numBlocks);
                            for(let i = 0; i < numBlocks; i++) {
                                const cVal = (colorPrng.next ? colorPrng.next().value : colorPrng());
                                const rVal = (rotPrng.next ? rotPrng.next().value : rotPrng());
                                fractalConfigs[i] = {
                                    mask: Math.floor(cVal * 256),
                                    rotation: Math.floor(rVal * 4)
                                };
                            }
                            // map of valid 2D coordinates that the Hilbert curve hits
                            // to ensure we don't skip pixels in a non-square image.
                            const validHilbertCoords = [];
                            for (let i = 0; i < n * n; i++) {
                                const coord = d2xy(n, i);
                                // add coordinates that actually exist in our image dimensions
                                if (coord.x < cols && coord.y < rows) {
                                    validHilbertCoords.push(coord);
                                }
                                if (validHilbertCoords.length === numBlocks) break;
                            }
                            for (let i = 0; i < numBlocks; i++) {
                                const hCoord = validHilbertCoords[i];
                                const fractalIdx = hCoord.y * cols + hCoord.x;
                                const srcIdx = isUnscramble ? fractalIdx : i;
                                const dstIdx = isUnscramble ? i : fractalIdx;
                                // use the loop index 'i' to pull the config so it remains consistent
                                const { mask, rotation } = fractalConfigs[i];
                                const chunk = uniqueChunks[chunkMap[srcIdx]];
                                const dy = Math.floor(dstIdx / cols) * block_size;
                                const dx = (dstIdx % cols) * block_size;
                                for (let y = 0; y < block_size; y++) {
                                    for (let x = 0; x < block_size; x++) {
                                        let targetX = x;
                                        let targetY = y;
                                        const activeRot = isUnscramble ? (4 - rotation) % 4 : rotation;
                                        if (activeRot === 1) {
                                            targetX = (block_size - 1) - y;
                                            targetY = x;
                                        } else if (activeRot === 2) {
                                            targetX = (block_size - 1) - x;
                                            targetY = (block_size - 1) - y;
                                        } else if (activeRot === 3) {
                                            targetX = y;
                                            targetY = (block_size - 1) - x;
                                        }
                                        if (dx + targetX < w && dy + targetY < h) {
                                            const p = ((dy + targetY) * w + (dx + targetX)) * 4;
                                            const bIdx = (y * block_size + x) * 4;
                                            data[p + 0] = chunk[bIdx + 0] ^ mask;
                                            data[p + 1] = chunk[bIdx + 1] ^ mask;
                                            data[p + 2] = chunk[bIdx + 2] ^ mask;
                                            data[p + 3] = chunk[bIdx + 3];
                                        }
                                    }
                                }
                            }
                            tCtx.putImageData(pixelData, 0, 0);
                            const resData = tCvs.toDataURL('image/png');
                            let fn = secureFn.checked ? Math.random().toString(36).substr(2,12)+".png" : (isUnscramble?'dec_':'enc_')+file.name;
                            processedFiles.push({ name: fn, data: resData });
                            if(autoDl.checked) { const a = document.createElement('a'); a.download = fn; a.href = resData; a.click(); }
                            if(upload.files.length === 1) { cvs.width = img.width; cvs.height = img.height; ctx.putImageData(pixelData, 0, 0); cvs.style.display = 'block'; placeholder.style.display = 'none'; }
                            logActivity(isUnscramble ? 'Unlocked' : 'Locked', file.name);
                            resolve();
                        } else if (modeType.checked != true && modeType2.checked != true && modeType3.checked == true) {
                            // ULTRA QUANTUM METHOD
                            // this implementation has pixel perfect re-replication in all tested cases
                            // it represents an entirely different methodology of simultaneously two-part middle-out chain-block-ciphering in a fractal pattern
                            // it seems to be ultra quantum proof where visual heuristics cannot determine specific features to its mapping space
                            // visual heuristic algorithms won't even know where to start so computation is impossible 
                            const tCvs = document.createElement('canvas');
                            const tCtx = tCvs.getContext('2d');
                            const w = img.width, h = img.height;
                            // power-of-2 dimension for morton curve
                            const dim = Math.pow(2, Math.ceil(Math.log2(Math.max(w, h))));
                            const totalPixels = dim * dim;
                            tCvs.width = w; tCvs.height = h;
                            const tempCvs = document.createElement('canvas');
                            const tempCtx = tempCvs.getContext('2d');
                            tempCvs.width = w; tempCvs.height = h;
                            tempCtx.drawImage(img, 0, 0);
                            const srcData = tempCtx.getImageData(0, 0, w, h).data;
                            const outData = tCtx.createImageData(w, h);
                            const d = outData.data;
                            const prng = createPRNG(seed);
                            const getMask = () => Math.floor((prng.next ? prng.next().value : prng()) * 256);
                            // morton z-order: interleaves bits to create fractal path
                            function getMortonXY(n) {
                                let x = 0, y = 0;
                                for (let i = 0; i < 16; i++) {
                                    x |= ((n >> (i * 2)) & 1) << i;
                                    y |= ((n >> (i * 2 + 1)) & 1) << i;
                                }
                                return [x, y];
                            }
                            const midPoint = Math.floor(totalPixels / 2);
                            let chainA = [getMask(), getMask(), getMask()]; 
                            let chainB = [getMask(), getMask(), getMask()];
                            // process from center outwards
                            for (let i = 0; i <= midPoint; i++) {
                                // forward Chain
                                processPixel(midPoint + i, chainA);
                                // backward Chain
                                if (midPoint - i >= 0 && i !== 0) {
                                    processPixel(midPoint - i, chainB);
                                }
                            }
                            function processPixel(index, state) {
                                const [x, y] = getMortonXY(index);
                                if (x >= w || y >= h) return;
                                const p = (y * w + x) * 4;
                                const mask = getMask();
                                if (!isUnscramble) {
                                    // xor with previous pixel in fractal path + PRNG mask
                                    const r = srcData[p], g = srcData[p+1], b = srcData[p+2];
                                    d[p]   = (r ^ state[0] ^ mask) & 0xFF;
                                    d[p+1] = (g ^ state[1] ^ mask) & 0xFF;
                                    d[p+2] = (b ^ state[2] ^ mask) & 0xFF;
                                    d[p+3] = 255;
                                    // update state with the ORIGINAL pixel values
                                    state[0] = r; state[1] = g; state[2] = b;
                                } else {
                                    // reverse the xor using the reconstructed state
                                    const encR = srcData[p], encG = srcData[p+1], encB = srcData[p+2];
                                    const r = (encR ^ state[0] ^ mask) & 0xFF;
                                    const g = (encG ^ state[1] ^ mask) & 0xFF;
                                    const b = (encB ^ state[2] ^ mask) & 0xFF;
                                    d[p]   = r;
                                    d[p+1] = g;
                                    d[p+2] = b;
                                    d[p+3] = 255;
                                    // update state with the RECOVERED original values
                                    state[0] = r; state[1] = g; state[2] = b;
                                }
                            }
                            tCtx.putImageData(outData, 0, 0);
                            const resData = await new Promise((resolve) => {
                                tCvs.toBlob((blob) => {
                                    const reader = new FileReader();
                                    reader.onloadend = () => resolve(reader.result);
                                    reader.readAsDataURL(blob);
                                }, 'image/png'); 
                            });
                            let fn = secureFn.checked ? Math.random().toString(36).substr(2,12)+".png" : (isUnscramble?'dec_':'enc_')+file.name;
                            processedFiles.push({ name: fn, data: resData });
                            if (upload.files.length === 1) {
                                cvs.width = tCvs.width;
                                cvs.height = tCvs.height;
                                ctx.drawImage(tCvs, 0, 0); 
                                cvs.style.display = 'block';
                                placeholder.style.display = 'none';
                            }
                            logActivity(isUnscramble ? 'Unlocked' : 'Locked', file.name);
                            resolve();
                        } else {
                            alert("Please select one mode and try again.");
                        }
                    };
                    // end of encryption/decryption methods
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        //movie/video functions
        async function processVideo(file, fps = 30, seed = "", isUnscramble = false) {
            const zip = new JSZip();
            const controller = new AbortController();
            const { signal } = controller;

            const loader = document.createElement('div');
            Object.assign(loader.style, {
                position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
                backgroundColor: 'rgba(0,0,0,0.95)', color: 'white', display: 'flex',
                flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                zIndex: '10000', fontFamily: 'system-ui, sans-serif', gap: '15px'
            });
            loader.innerHTML = `
                <div style="border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
                <canvas id="live-preview" style="max-width: 80%; max-height: 40vh; border: 2px solid #444; border-radius: 8px; background: #000; display: block;"></canvas>
                <p id="progress-text" style="font-size: 14px; color: #ccc; margin: 0;">Initializing...</p>
                <div style="width: 250px; height: 8px; background: #333; border-radius: 4px; overflow: hidden;"><div id="bar" style="width: 0%; height: 100%; background: #3498db;"></div></div>
                <button id="cancel-btn" style="padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Cancel</button>
                <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            `;
            document.body.appendChild(loader);
            const bar = loader.querySelector('#bar'), status = loader.querySelector('#progress-text');
            const livePreview = loader.querySelector('#live-preview'), lpCtx = livePreview.getContext('2d', { alpha: false });
            loader.querySelector('#cancel-btn').onclick = () => controller.abort();

            try {
                if (!isUnscramble) {
                    const video = document.createElement('video');
                    video.src = URL.createObjectURL(file);
                    await new Promise(r => video.onloadedmetadata = r);
                    const { videoWidth: w, videoHeight: h, duration } = video;
                    
                    const metadata = { fps, w, h, duration, totalFrames: Math.round(duration * fps), name: file.name };
                    zip.file("metadata.json", JSON.stringify(metadata));

                    livePreview.width = w; livePreview.height = h;
                    const cvs = new OffscreenCanvas(w, h);
                    const ctx = cvs.getContext('2d', { willReadFrequently: true, colorSpace: 'srgb' });
                    
                    const len = w * h, prng = createPRNG(seed), map = new Int32Array(len);
                    for(let i=0; i<len; i++) map[i]=i;
                    for(let i=len-1; i>0; i--) {
                        const j = Math.floor((prng.next ? prng.next().value : prng()) * (i + 1));
                        [map[i], map[j]] = [map[j], map[i]];
                    }

                    let currentTime = 0, frameIdx = 0;
                    while (currentTime < duration) {
                        if (signal.aborted) return;
                        video.currentTime = currentTime;
                        await new Promise(r => video.onseeked = r);
                        ctx.drawImage(video, 0, 0);
                        
                        const pixelData = ctx.getImageData(0, 0, w, h, { colorSpace: 'srgb' });
                        const data32 = new Uint32Array(pixelData.data.buffer), temp32 = new Uint32Array(data32);
                        for(let j=0; j<len; j++) data32[map[j]] = temp32[j];
                        ctx.putImageData(pixelData, 0, 0);
                        
                        lpCtx.drawImage(cvs, 0, 0);
                        const blob = await cvs.convertToBlob({ type: 'image/png' });
                        zip.file(`f_${frameIdx.toString().padStart(5,'0')}.png`, blob);
                        
                        frameIdx++; currentTime += 1/fps;
                        status.innerText = `Scrambling: ${frameIdx}/${metadata.totalFrames}`;
                        bar.style.width = `${(frameIdx / metadata.totalFrames) * 100}%`;
                        await new Promise(r => setTimeout(r, 0));
                    }

                    const finalZip = await zip.generateAsync({ type: "blob" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(finalZip);
                    a.download = file.name.split('.')[0] + "_secure.mp4";
                    a.click();

                } else {
                    status.innerText = "Reading Metadata...";
                    const unzipped = await zip.loadAsync(file);
                    const meta = JSON.parse(await unzipped.file("metadata.json").async("string"));
                    const frameNames = Object.keys(unzipped.files).filter(n => n.endsWith('.png')).sort();
                    
                    const { w, h, fps: originalFps } = meta;
                    const frameDuration = 1000 / originalFps; // Calculate exact timing
                    
                    const len = w * h, prng = createPRNG(seed), map = new Int32Array(len);
                    for(let k=0; k<len; k++) map[k]=k;
                    for(let k=len-1; k>0; k--) {
                        const j = Math.floor((prng.next ? prng.next().value : prng()) * (k + 1));
                        [map[k], map[j]] = [map[j], map[k]];
                    }

                    const outCanvas = document.createElement('canvas');
                    outCanvas.width = w; outCanvas.height = h;
                    const outCtx = outCanvas.getContext('2d', { alpha: false, colorSpace: 'srgb', willReadFrequently: true });
                    livePreview.width = w; livePreview.height = h;

                    const stream = outCanvas.captureStream(0); 
                    const recorder = new MediaRecorder(stream, { 
                        mimeType: 'video/webm;codecs=vp9', 
                        videoBitsPerSecond: 150000000 
                    });
                    const chunks = [];
                    recorder.ondataavailable = e => chunks.push(e.data);

                    for (let i = 0; i < frameNames.length; i++) {
                        if (signal.aborted) { recorder.stop(); return; }
                        const imgBlob = await unzipped.file(frameNames[i]).async("blob");
                        const img = await createImageBitmap(imgBlob);
                        
                        outCtx.drawImage(img, 0, 0);
                        const pixelData = outCtx.getImageData(0, 0, w, h, { colorSpace: 'srgb' });
                        const data32 = new Uint32Array(pixelData.data.buffer), temp32 = new Uint32Array(data32);
                        for(let j=0; j<len; j++) data32[j] = temp32[map[j]];
                        outCtx.putImageData(pixelData, 0, 0);
                        
                        if (i === 0) recorder.start();
                        else recorder.resume();

                        stream.getVideoTracks()[0].requestFrame(); 
                        lpCtx.drawImage(outCanvas, 0, 0);
                        
                        await new Promise(r => setTimeout(r, frameDuration));
                        if (i < frameNames.length - 1) recorder.pause();

                        status.innerText = `Unscrambling: ${i+1}/${frameNames.length}`;
                        bar.style.width = `${((i+1)/frameNames.length)*100}%`;
                        img.close();
                    }
                    
                    recorder.stop();
                    recorder.onstop = () => {
                        const finalBlob = new Blob(chunks, { type: 'video/webm' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(finalBlob);
                        a.download = "unscrambled_" + (meta.name || "video.webm");
                        a.click();
                    };
                }
            } catch (e) { console.error(e); } finally { if (document.body.contains(loader)) document.body.removeChild(loader); }
        }

                        unscrambledData[d + 1] = tempData[s + 1]; 
                        unscrambledData[d + 2] = tempData[s + 2]; 
                    }
                    const recoveredBytes = new Uint8Array(originalSize);
                    let rIdx = 0;
                    for (let i = 0; i < unscrambledData.length && rIdx < originalSize; i += 4) {
                        recoveredBytes[rIdx++] = unscrambledData[i];
                        if (rIdx < originalSize) recoveredBytes[rIdx++] = unscrambledData[i+1];
                        if (rIdx < originalSize) recoveredBytes[rIdx++] = unscrambledData[i+2];
                    }
                    const finalBlob = new Blob([recoveredBytes]);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(finalBlob);
                    a.download = `dec_${originalName}`;
                    a.click();
                }
            } catch (e) {
                alert("Masquerade Restoration Error: " + e.message);
            } finally {
                setTimeout(() => { if(document.body.contains(loader)) document.body.removeChild(loader); }, 1000);
            }
        }

        // analytical functions
        function analyzeCanvasImage() {
            const canvas = document.getElementById('cvs');
            if (!canvas) {
                console.error("Canvas with id 'cvs' not found.");
                return;
            }
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const totalPixels = width * height;
            let uniqueColors = new Set();
            let brightnessDistribution = new Array(256).fill(0);
            let totalGradient = 0;
            let edgePixels = 0;
            const edgeThreshold = 30;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    uniqueColors.add(`${r},${g},${b}`);
                    brightnessDistribution[Math.round(luma)]++;
                    if (x < width - 1 && y < height - 1) {
                        const rightIdx = (y * width + (x + 1)) * 4;
                        const downIdx = ((y + 1) * width + x) * 4;
                        const lumaRight = 0.299 * data[rightIdx] + 0.587 * data[rightIdx+1] + 0.114 * data[rightIdx+2];
                        const lumaDown = 0.299 * data[downIdx] + 0.587 * data[downIdx+1] + 0.114 * data[downIdx+2];
                        const gradient = Math.abs(luma - lumaRight) + Math.abs(luma - lumaDown);
                        totalGradient += gradient;
                        if (gradient > edgeThreshold) edgePixels++;
                    }
                }
            }
            const edgeDensity = (edgePixels / totalPixels) * 100;
            const avgGradient = totalGradient / totalPixels;
            // fractal detection logic: 
            // noise usually has very high edge density (>45%). 
            // fractals (like Hilbert) have high complexity but lower edge density (15-30%) because of spatial clustering.
            const isHighEntropy = (edgeDensity > 40 || avgGradient > 50);
            const isFractalMapping = (edgeDensity > 10 && edgeDensity < 35);
            const isFractal = (edgeDensity > 10 && edgeDensity < 35 && avgGradient < 60);
            var fractalStatus = isFractal ? "Detected (Recursive Structure)" : "None (High Entropy/Noise)";
            var fractalColor = isFractal ? "#00f2ff" : "#888";
            if(isFractalMapping && !isHighEntropy) {
                fractalStatus = "Detected (Recursive Structure)";
                fractalColor = "#4CAF50";
            } else if (!isFractalMapping && isHighEntropy) {
                fractalStatus = "Undetected (Incalculable Due to Ultra High Entropy)";
                fractalColor = "#00f2ff";
            }
            // quantum Resistance Level:
            // based on the complexity of the mapping. Fractal shuffles effectively double the search space 
            // for classical solvers, but Grover's Algorithm effectively halves bit-security.
            let qrLevel = "Low (Standard Shuffle)";
            let qrColor = "#f44336";
            if (isFractal) {
                qrLevel = "High (Non-Linear Geometric Mapping)";
                qrColor = "#4CAF50";
            } else if (isHighEntropy) {
                qrLevel = "Ultra High (256-bit Entropy Pool)";
                qrColor = "#00f2ff";
            }
            let likelihood = "High";
            let colorAction = "#4CAF50";
            if (edgeDensity > 40 || avgGradient > 50) {
                likelihood = "Very Low (High Entropy/Noise)";
                colorAction = "#00f2ff";
            } else if (edgeDensity > 20) {
                likelihood = "Moderate (Complex Scramble)";
                colorAction = "#ff9800";
            }
            const modal = document.createElement('div');
            Object.assign(modal.style, {
                position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                width: '85%', maxHeight: '90vh', backgroundColor: '#0f0f0f', color: '#fff',
                boxShadow: '0 0 40px rgba(0,0,0,0.9)', zIndex: '10000', padding: '25px',
                borderRadius: '12px', overflowY: 'auto', fontFamily: 'monospace', border: '1px solid #333'
            });
            const overlay = document.createElement('div');
            Object.assign(overlay.style, {
                position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
                backgroundColor: 'rgba(0,0,0,0.9)', zIndex: '9999'
            });
            modal.innerHTML = `
                <h2 style="margin-top:0; color:#4A90E2; border-bottom: 1px solid #333; padding-bottom:10px;">Image Structural Analysis</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom:20px;">
                    <div style="line-height: 1.6;">
                        <p><strong>Total Pixels:</strong> ${totalPixels.toLocaleString()}</p>
                        <p><strong>Unique Colors:</strong> ${uniqueColors.size.toLocaleString()}</p>
                        <p><strong>Edge Density:</strong> ${edgeDensity.toFixed(2)}%</p>
                        <p><strong>Avg Gradient:</strong> ${avgGradient.toFixed(2)}</p>
                    </div>
                    <div style="background:#151515; padding:15px; border-radius:8px; border-left: 5px solid ${colorAction}">
                        <p style="margin:0; font-size: 0.8em; text-transform:uppercase; color:#888;">Recovery Likelihood</p>
                        <h3 style="margin:5px 0; color:${colorAction}">${likelihood}</h3>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom:20px;">
                    <div style="background:#151515; padding:15px; border-radius:8px; border-top: 2px solid ${fractalColor}">
                        <p style="margin:0; font-size: 0.8em; color:#888;">Fractal Signature</p>
                        <p style="margin:5px 0; color:${fractalColor}; font-weight:bold;">${fractalStatus}</p>
                    </div>
                    <div style="background:#151515; padding:15px; border-radius:8px; border-top: 2px solid ${qrColor}">
                        <p style="margin:0; font-size: 0.8em; color:#888;">Quantum Resistance</p>
                        <p style="margin:5px 0; color:${qrColor}; font-weight:bold;">${qrLevel}</p>
                    </div>
                </div>
                
                <h3 style="font-size:0.9em; color:#888;">Edge/Brightness Frequency</h3>
                <div id="graph-container" style="display:flex; align-items:flex-end; height:100px; background:#050505; border:1px solid #333; gap:1px; padding:5px;"></div>
                
                <div style="margin-top:20px; display:flex; justify-content:flex-end;">
                    <button id="close-modal" style="padding:10px 25px; cursor:pointer; background:#222; border:1px solid #444; color:white; border-radius:4px; transition: 0.3s;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#222'">Dismiss Analysis</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.body.appendChild(modal);
            document.getElementById('close-modal').onclick = () => { modal.remove(); overlay.remove(); };
            const graphContainer = modal.querySelector('#graph-container');
            const maxVal = Math.max(...brightnessDistribution);
            brightnessDistribution.forEach(val => {
                const bar = document.createElement('div');
                const hPercent = (val / maxVal) * 100;
                Object.assign(bar.style, {
                    flex: '1', height: `${hPercent}%`, backgroundColor: isFractal ? '#00f2ff' : colorAction, minWidth: '1px'
                });
                graphContainer.appendChild(bar);
            });
        }
        // lossless and lossy functions
        async function compressImageLossless(canvas) {
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const compressedBuffer = UPNG.encode([imgData.buffer], canvas.width, canvas.height, 0);
            return new Blob([compressedBuffer], { type: 'image/png' });
        }
        async function compressImageLosslessWithQuantization(canvas) {
            const ctx = canvas.getContext('2d');
            const { width, height } = canvas;
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const compressedBuffer = UPNG.encode([imgData.buffer], width, height, 256);
            return new Blob([compressedBuffer], { type: 'image/png' });
        }
        async function compressImageAdaptive(canvas) {
            const ctx = canvas.getContext('2d');
            const { width, height } = canvas;
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const uniqueColors = new Set();
            for (let i = 0; i < imgData.length; i += 16) { 
                const color = (imgData[i] << 24) | (imgData[i+1] << 16) | (imgData[i+2] << 8) | imgData[i+3];
                uniqueColors.add(color);
                if (uniqueColors.size > 2000) break;
            }
            let colorCount;
            if (uniqueColors.size < 100) {
                colorCount = 64;   // low complexity
            } else if (uniqueColors.size < 1000) {
                colorCount = 128;  // medium complexity
            } else {
                colorCount = 256;  // high complexity
            }
            const compressedBuffer = UPNG.encode([imgData.buffer], width, height, colorCount);
            return new Blob([compressedBuffer], { type: 'image/png' });
        }
    </script>
