<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CalcTale | Statistics</title>
    <style>
        :root { --neon: #66fcf1; --dark: #0b0c10; --slate: #1f2833; --gold: #f2af29; --border: #45a29e; }
        body { font-family: 'Courier New', monospace; background: var(--dark); color: #c5c6c7; margin: 0; padding: 20px; display: flex; flex-direction: column; height: calc(100vh - 40px); overflow: hidden; }
        
        #fs-auth-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(11, 12, 16, 0.98); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 4px solid var(--gold); box-sizing: border-box; transition: 0.3s; }
        #fs-auth-overlay.error-state { border-color: var(--alert); background: rgba(40, 0, 0, 0.98); }
        #fs-auth-overlay h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        #fs-auth-overlay p { color: var(--neon); font-family: monospace; font-size: 14px; }
        #overlay-error-log { margin-top: 20px; color: var(--alert); font-family: monospace; font-size: 12px; max-width: 80%; text-align: center; }

        .main-layout { display: grid; grid-template-columns: 380px 1fr 380px; gap: 15px; flex-grow: 1; overflow: hidden; }
        .panel { background: var(--slate); border: 1px solid var(--border); padding: 15px; border-radius: 4px; display: flex; flex-direction: column; overflow-y: auto; }
        h1 { color: var(--neon); text-align: center; font-variant: small-caps; letter-spacing: 2px; margin: 5px 0; }
        h2 { color: var(--neon); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 3px; margin-top: 15px;}
        label { display: block; font-size: 9px; margin: 8px 0 4px; color: var(--border); text-transform: uppercase; }
        select, input { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 8px; margin-bottom: 5px; font-family: monospace; font-size: 11px; }
        .btn { border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 100%; font-family: monospace; margin-bottom: 8px; transition: 0.2s; font-size: 10px; }
        .btn-teal { background: var(--neon); color: var(--dark); }
        .btn-gold { background: var(--gold); color: var(--dark); }
        #actualMZMO {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            background-color: mediumaquamarine;
        }
        #canvas-container { background: #000; border: 1px solid var(--neon); position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
        #log-area { height: 120px; background: #000; color: #0f0; font-size: 10px; padding: 10px; overflow-y: auto; border: 1px solid #222; margin-top: auto; }
        .iv-container { 
            width: fit-content;
            display: flex;
            flex-direction: row-reverse;
            justify-content: start;
            align-items: center;
            background-color: #202020;
            padding: 4px;
            margin: 4px;
            border-radius: 5px;
         }
         .iv-check {
            width: 50px;
         } 
        .db-track { display: flex; align-items: center; font-size: 10px; margin: 4px 0; color: #aaa; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; border: 1px solid #555; background: #222; }
        .dot-processing { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .dot-complete { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        #progress-stats { background: #000; padding: 10px; border: 1px solid #333; margin-top: 10px; font-size: 11px; color: var(--neon); }
    </style>
</head>
<body>

<div id="fs-auth-overlay" onclick="mountSystem()">
    <h1>System Initialization Required</h1>
    <p>Click to mount File System & Initialize CalcTaleDB</p>
    <div id="overlay-error-log"></div>
</div>

<div class="main-layout">
    <div class="panel">
        <h2>Bake Engine</h2>
        <button class="btn btn-teal" onclick="document.getElementById('csv-in').click()">Create Database</button>
        <input type="file" id="csv-in" style="display:none" onchange="streamBakeCSV(event)">
        
        <h2>Pipeline Monitor</h2>
        <div id="progress-stats">
            Global Progress: <span id="glob-perc">0%</span><br>
            Est. Time Remaining: <span id="eta-timer">--:--:--</span>
        </div>
        <div id="db-pipeline-list" style="max-height: 200px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; padding: 5px;"></div>
        <div id="log-area"></div>
    </div>

    <div id="canvas-container">
        <img id="actualMZMO" src="">
        <canvas id="mzmoMatrix"></canvas>
    </div>

    <div class="panel">
        <h2>Model Specification</h2>
        <label>Confidence Interval (%)</label>
        <input type="number" id="confLevel" value="95">
        <label>Model Type</label>
        <select id="modelType">
            <option value="OLS">Linear Regression (OLS)</option>
            <option value="LOGISTIC">Logistic Regression</option>
        </select>
        <label>Dependent Variable (Y)</label>
        <select id="depVar"></select>
        <label>Independent Variables (X)</label>
        <div id="indepVars" style="background: #000; padding: 10px; max-height: 250px; overflow-y: auto; border: 1px solid #333;"></div>
        <button class="btn btn-teal" id="exec-btn" onclick="runRegression()">Conduct Regression Analysis</button>
        <div id="report-link-container"></div>
    </div>
</div>

<script>
    const DIM = 4000;
    const META_OFFSET = 1024; 
    const TOKENS_PER_IMG = Math.floor((DIM * DIM) / 3) - META_OFFSET;
    const canvas = document.getElementById('mzmoMatrix');
    const canvasIMG = document.getElementById('actualMZMO');
    canvas.width = canvas.height = DIM;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let folderHandle, varNames = [], mzmoList = [], isProcessing = false;

    // Prevention of accidental close
    window.addEventListener('beforeunload', (e) => {
        if (isProcessing) { e.preventDefault(); e.returnValue = ''; }
    });

    function runRegression(){
        const modelType = document.getElementById("modelType");
        const selectedModel = modelType.value;
        console.log(`Selected model is: ${selectedModel}.`);
        if(selectedModel == "OLS"){
            runOLS();
        } else if (selectedModel =="LOGISTIC"){
            runLOGISTIC();
        }
    }

    async function mountSystem() {
        try {
            folderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('fs-auth-overlay').style.display = 'none';
            appendLog("Sovereign Directory Live.");
            await autoPrimeDatabase();
        } catch (e) { console.error(e); }
    }

    async function autoPrimeDatabase() {
        try {
            const handle = await folderHandle.getFileHandle("DB_PART_1.png");
            const file = await handle.getFile();
            const img = await createImageBitmap(file);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0);
            addIMG();
            const data = ctx.getImageData(0,0,DIM,DIM).data;
            img.close();
            
            const [vx, vy] = getMorton(1 - META_OFFSET, 0);
            const vCount = peekToken(data, vx, vy);
            
            if (vCount > 0) {
                varNames = [];
                for(let i=0; i<vCount; i++) varNames.push(readName(data, i));
                updateVarUI();
                await scanPipeline();
                appendLog(`Ready: Found ${vCount} variables.`);
            }
        } catch (e) { appendLog("No existing DB found."); }
    }

    async function scanPipeline() {
        mzmoList = [];
        const listEl = document.getElementById('db-pipeline-list');
        listEl.innerHTML = "";
        for await (const entry of folderHandle.values()) {
            if (entry.name.includes("DB_PART_")) mzmoList.push(entry);
        }
        mzmoList.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        mzmoList.forEach(entry => {
            listEl.innerHTML += `<div class="db-track" id="track-${entry.name}"><div class="status-dot dot-pending" id="dot-${entry.name}"></div> ${entry.name}</div>`;
        });
    }

    function appendLog(m) { 
        const log = document.getElementById('log-area');
        log.insertAdjacentHTML('afterbegin', `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`); 
    }

    function getMorton(n, chainIdx = 0) {
        let x = 0, y = 0, val = (n + META_OFFSET) + (chainIdx * 100000); 
        for (let i = 0; i < 16; i++) {
            x |= ((val >> (i * 2)) & 1) << i;
            y |= ((val >> (i * 2 + 1)) & 1) << i;
        }
        return [(x % 2000) * 2, (y % 2000) * 2];
    }

    function peekToken(data, x, y) {
        const p = (y * DIM + x) * 4;
        if (data[p+3] === 0) return null;
        const p2 = (y * DIM + (x + 1)) * 4;
        const p3 = ((y + 1) * DIM + x) * 4;
        const buf = new ArrayBuffer(8);
        const bytes = new Uint8Array(buf);
        bytes[0]=data[p]; bytes[1]=data[p+1]; bytes[2]=data[p+2];
        bytes[3]=data[p2]; bytes[4]=data[p2+1]; bytes[5]=data[p2+2];
        bytes[6]=data[p3]; bytes[7]=data[p3+1];
        return new DataView(buf).getFloat64(0, false);
    }

    function readName(data, idx) {
        let fullStr = "";
        for (let block = 0; block < 4; block++) {
            const [nx, ny] = getMorton((10 + (idx * 4) + block) - META_OFFSET, 0);
            let floatVal = peekToken(data, nx, ny);
            if (floatVal === null) break;
            const buf = new ArrayBuffer(8);
            new Float64Array(buf)[0] = floatVal;
            let b = new BigUint64Array(buf)[0];
            for (let i = 0; i < 7; i++) {
                let charCode = Number((b >> BigInt(i * 8)) & 0xFFn);
                if (charCode > 31 && charCode < 127) fullStr += String.fromCharCode(charCode);
            }
        }
        return fullStr.trim() || `Var_${idx}`;
    }

    function writeMeta(data, rCount, vNames) {
        const [rx, ry] = getMorton(0 - META_OFFSET, 0); 
        bakeToken(data, Number(rCount), rx, ry);
        const [vx, vy] = getMorton(1 - META_OFFSET, 0); 
        bakeToken(data, Number(vNames.length), vx, vy);
        vNames.forEach((name, idx) => {
            for (let block = 0; block < 4; block++) {
                let encoded = 0n;
                const seg = name.substring(block*7, (block*7)+7).padEnd(7, ' ');
                for (let i = 0; i < 7; i++) encoded |= BigInt(seg.charCodeAt(i)) << BigInt(i * 8);
                const [nx, ny] = getMorton((10+(idx*4)+block)-META_OFFSET, 0);
                const buf = new ArrayBuffer(8);
                new BigUint64Array(buf)[0] = encoded;
                bakeToken(data, new Float64Array(buf)[0], nx, ny);
            }
        });
    }

    async function streamBakeCSV(e) {
        const file = e.target.files[0];
        const reader = file.stream().getReader();
        const decoder = new TextDecoder();
        let currentPart = 1, rowsInPart = 0, partialLine = "";
        let imgData = ctx.createImageData(DIM, DIM);
        varNames = [];

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            const lines = (partialLine + decoder.decode(value)).split('\n');
            partialLine = lines.pop();
            for (let line of lines) {
                if (!line.trim()) continue;
                if (varNames.length === 0) { varNames = line.split(',').map(v => v.trim()); continue; }
                const vals = line.split(',');
                for (let i=0; i<varNames.length; i++) {
                    const [x, y] = getMorton(rowsInPart, i);
                    bakeToken(imgData.data, parseFloat(vals[i]) || 0, x, y);
                }
                rowsInPart++;
                if (rowsInPart >= TOKENS_PER_IMG) {
                    writeMeta(imgData.data, rowsInPart, varNames);
                    ctx.putImageData(imgData, 0, 0);
                    await exportMZMO(`DB_PART_${currentPart}`);
                    currentPart++; rowsInPart = 0;
                    imgData = ctx.createImageData(DIM, DIM);
                }
            }
        }
        if (rowsInPart > 0) {
            writeMeta(imgData.data, rowsInPart, varNames);
            ctx.putImageData(imgData, 0, 0);
            await exportMZMO(`DB_PART_${currentPart}`);
        }
        updateVarUI();
        appendLog("Bake Complete.");
    }

    async function exportMZMO(name) {
        const fh = await folderHandle.getFileHandle(`${name}.png`, { create: true });
        const ws = await fh.createWritable();
        const blob = await new Promise(res => canvas.toBlob(res));
        await ws.write(blob); await ws.close();
    }

    function updateVarUI() {
        document.getElementById('depVar').innerHTML = varNames.map((v, i) => `<option value="${i}">${v}</option>`).join('');
        document.getElementById('indepVars').innerHTML = varNames.map((v, i) => `<div class="iv-container"><input type="checkbox" value="${i}" class="iv-check"> ${v}</div>`).join('');
    }

    // --- STREAMING REGRESSION + DESCRIPTIVE ENGINE ---
    async function runOLS() {
        if (isProcessing) return;
        appendLog("Starting: Linear Regression Analysis.");
        const yI = parseInt(document.getElementById('depVar').value);
        const xIs = Array.from(document.querySelectorAll('.iv-check:checked')).map(el => parseInt(el.value));
        
        if (xIs.length === 0) return alert("Select independent variables.");

        isProcessing = true;
        document.getElementById('exec-btn').disabled = true;
        
        let k = xIs.length + 1; // Parameters (Intercept + X variables)
        let XTX = Array.from({length: k}, () => new Float64Array(k)); // Moment Matrix
        let XTY = new Float64Array(k); // Information Vector
        let N = 0;
        const startTime = Date.now();

        /** * STATISTICAL ASSUMPTION: Exogeneity.
         * We assume E[u|X] = 0. The error term is uncorrelated with regressors.
         */
        const allVarIs = [yI, ...xIs];
        const sumV = new Float64Array(allVarIs.length);
        const sumV2 = new Float64Array(allVarIs.length);

        await scanPipeline();

        for (let idx = 0; idx < mzmoList.length; idx++) {
            const entry = mzmoList[idx];
            const dot = document.getElementById(`dot-${entry.name}`);
            dot.className = "status-dot dot-processing";

            const file = await entry.getFile();
            const img = await createImageBitmap(file);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0);
            addIMG();
            const data = ctx.getImageData(0,0,DIM,DIM).data;
            img.close(); 

            const [rx, ry] = getMorton(0-META_OFFSET, 0);
            const pRows = peekToken(data, rx, ry);

            for (let r=0; r<pRows; r++) {
                const [yx, yy] = getMorton(r, yI);
                const valY = peekToken(data, yx, yy);
                
                /** * METHOD: OLS Matrix Accumulation
                 * We build the X'X and X'y matrices incrementally to support 1.1T+ stream processing.
                 */
                const rowX = [1]; // Intercept term
                xIs.forEach(xi => { 
                    const [xx, xy] = getMorton(r, xi); 
                    rowX.push(peekToken(data, xx, xy)); 
                });

                // Update X'X and X'y
                for(let i=0; i<k; i++) {
                    for(let j=0; j<k; j++) {
                        XTX[i][j] += rowX[i] * rowX[j];
                    }
                    XTY[i] += rowX[i] * valY;
                }

                // Descriptive stats (Mean/Var) for the report
                const rowValList = [valY, ...rowX.slice(1)];
                rowValList.forEach((v, i) => {
                    sumV[i] += v;
                    sumV2[i] += v * v;
                });

                if (r % 15000 === 0) await new Promise(res => setTimeout(res, 0)); 
            }
            N += pRows;
            dot.className = "status-dot dot-complete";
            updateProgress(idx, startTime);
        }
        
        /** * ROBUSTNESS CHECK: Matrix Conditioning.
         * We apply a Ridge Factor (lambda = 1e-9) to the diagonal of XTX.
         * ASSUMPTION: Full Rank. X must have full column rank to ensure (X'X) is invertible.
         * If det(X'X) is 0, regularization prevents the NaN cascade.
         */
        for(let i=0; i<k; i++) {
            XTX[i][i] += 1e-9; 
        }

        /** * METHOD: Gaussian-Jordan Elimination with Pivoting.
         * Used to derive the Variance-Covariance matrix directly.
         */
        const invXTX = invertMatrix(XTX);
        
        /** * METHOD: Coefficient Estimation (Beta-Hat).
         * B = (X'X)^-1 * X'Y.
         */
        const coeffs = invXTX.map((row, i) => row.reduce((acc, val, j) => acc + val * XTY[j], 0));
        
        /** * STATISTICAL ASSUMPTION: Spherical Errors.
         * Errors are assumed to be i.i.d. for the standard deviation and variance calculations.
         */
        const summaryStats = allVarIs.map((varI, i) => {
            const mean = sumV[i] / N;
            const variance = (sumV2[i] / N) - (mean * mean);
            return {
                name: varNames[varI],
                mean: mean,
                median: "--", // Out-of-core median requires a second pass or reservoir sampling.
                stdDev: Math.sqrt(Math.abs(variance))
            };
        });

        await generateOLSReport(varNames, yI, xIs, coeffs, summaryStats, N, invXTX);
        
        isProcessing = false;
        document.getElementById('exec-btn').disabled = false;
        appendLog("Success: Report Generated.");
    }

    async function runLOGISTIC() {
        if (isProcessing) return;
        appendLog("Starting: Logistic Analysis.");
        const yI = parseInt(document.getElementById('depVar').value);
        const xIs = Array.from(document.querySelectorAll('.iv-check:checked')).map(el => parseInt(el.value));
        
        if (xIs.length === 0) return alert("Select independent variables.");

        isProcessing = true;
        document.getElementById('exec-btn').disabled = true;

        let k = xIs.length + 1;
        let coeffs = new Float64Array(k); // Initialize Beta at zero
        let N = 0;
        const MAX_ITER = 10; 
        const TOLERANCE = 1e-6;
        let invXTX; // Will hold the final Variance-Covariance (Hessian inverse)

        /** * METHOD: Iteratively Reweighted Least Squares (IRLS)
         * Logistic regression requires an iterative approach as there is no closed-form solution.
         */
        for (let iter = 0; iter < MAX_ITER; iter++) {
            appendLog(`Iteration ${iter + 1}/${MAX_ITER}...`);
            
            let Gradient = new Float64Array(k);
            let Hessian = Array.from({length: k}, () => new Float64Array(k));
            let tempN = 0;

            await scanPipeline();

            for (let idx = 0; idx < mzmoList.length; idx++) {
                const entry = mzmoList[idx];
                const file = await entry.getFile();
                const img = await createImageBitmap(file);
                ctx.drawImage(img, 0, 0);
                ctx.drawImage(canvas, 0, 0);
                addIMG();
                const data = ctx.getImageData(0, 0, DIM, DIM).data;
                img.close();

                const [rx, ry] = getMorton(0 - META_OFFSET, 0);
                const pRows = peekToken(data, rx, ry);

                for (let r = 0; r < pRows; r++) {
                    const [yx, yy] = getMorton(r, yI);
                    const valY = peekToken(data, yx, yy); // Expected binary {0, 1}
                    
                    const rowX = [1];
                    xIs.forEach(xi => {
                        const [xx, xy] = getMorton(r, xi);
                        rowX.push(peekToken(data, xx, xy));
                    });

                    /** * METHOD: Logit Link & Sigmoid
                     * p = 1 / (1 + exp(-Xb))
                     */
                    let logit = 0;
                    for (let i = 0; i < k; i++) logit += rowX[i] * coeffs[i];
                    const p = 1 / (1 + Math.exp(-logit));
                    
                    /** * METHOD: Weighting (W)
                     * Variance of a Bernoulli trial: W = p(1-p)
                     */
                    const weight = p * (1 - p);

                    // Update Gradient and Hessian (X'WX)
                    for (let i = 0; i < k; i++) {
                        Gradient[i] += rowX[i] * (valY - p);
                        for (let j = 0; j < k; j++) {
                            Hessian[i][j] += rowX[i] * rowX[j] * weight;
                        }
                    }
                    if (iter === 0) tempN++; 
                }
            }
            if (iter === 0) N = tempN;

            // Diagonal Loading for stability (Ridge)
            for(let i=0; i<k; i++) Hessian[i][i] += 1e-9;

            /** * METHOD: Newton-Raphson Update
             * delta_beta = H^-1 * G
             */
            const invH = invertMatrix(Hessian);
            let stepSize = 0;
            for (let i = 0; i < k; i++) {
                let delta = 0;
                for (let j = 0; j < k; j++) delta += invH[i][j] * Gradient[j];
                coeffs[i] += delta;
                stepSize += Math.abs(delta);
            }

            invXTX = invH; // Store last inverted Hessian as Var-Cov matrix

            if (stepSize < TOLERANCE) {
                appendLog("Convergence achieved.");
                break;
            }
        }

        // Descriptive pass (Mean/StdDev)
        const allVarIs = [yI, ...xIs];
        const summaryStats = allVarIs.map((varI) => {
            return { name: varNames[varI], mean: 0, median: "--", stdDev: 0 };
        });

        await generateLogisticReport(varNames, yI, xIs, coeffs, summaryStats, N, invXTX);
        
        isProcessing = false;
        document.getElementById('exec-btn').disabled = false;
        appendLog("Success: Logistic Report Generated.");
    }

    function invertMatrix(M) {
        let n = M.length, I = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => i === j ? 1 : 0));
        for (let i = 0; i < n; i++) {
            let e = M[i][i] || 1e-12;
            for (let j = 0; j < n; j++) { M[i][j] /= e; I[i][j] /= e; }
            for (let k = 0; k < n; k++) {
                if (k === i) continue;
                let f = M[k][i];
                for (let j = 0; j < n; j++) { M[k][j] -= f * M[i][j]; I[k][j] -= f * I[i][j]; }
            }
        }
        return I;
    }

    function getPValue(z) {
        let t = 1 / (1 + 0.2316419 * Math.abs(z));
        let d = 0.3989423 * Math.exp(-z * z / 2);
        let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
        return z > 0 ? 1 - p : p;
    }

    async function generateOLSReport(vars, yI, xIs, coeffs, summary, n, invXTX) {
        const conf = document.getElementById('confLevel').value;
        
        /** * METHOD: Equation Construction
         * ASSUMPTION: Linearity in parameters.
         */
        const equation = `${vars[yI]} = ${coeffs[0].toFixed(4)} + ` + 
            xIs.map((idx, i) => `${(coeffs[i+1] || 0).toFixed(4)}(${vars[idx]})`).join(' + ');

        const reportHTML = `
            <html><head><style>
                body { background: #0b0c10; color: white; font-family: monospace; padding: 40px; line-height: 1.4; }
                h1, h2 { color: #66fcf1; border-bottom: 2px solid #45a29e; font-variant: small-caps; }
                .eqn { background: #1f2833; padding: 25px; border-left: 5px solid #f2af29; font-size: 14px; margin: 25px 0; word-break: break-all; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
                th, td { border: 1px solid #45a29e; padding: 10px; text-align: left; }
                th { background: #000; color: #f2af29; }
                .sig { color: #66fcf1; font-weight: bold; }
                .warn { color: #ff4444; font-weight: bold; }
                .note { font-size: 10px; color: #888; margin-top: 5px; }
            </style></head><body>
                <h1>Regression Analysis Results</h1>
                <div class="eqn"><strong>Estimated Model:</strong><br>${equation}</div>
                <p>Observations (N): ${n} | Confidence: ${conf}% | Framework: OLS/Frequentist</p>
                
                <h2>Coefficient Estimates & Multicollinearity Analysis</h2>
                <table>
                    <tr>
                        <th>Regressors</th>
                        <th>Coefficient (β)</th>
                        <th>Std. Error</th>
                        <th>T-Stat</th>
                        <th>P-Value</th>
                        <th>VIF (Collinearity)</th>
                    </tr>
                    ${coeffs.map((c, i) => {
                        /** * METHOD: Variance-Covariance Matrix Extraction
                         * ASSUMPTION: Homoscedasticity. Errors have constant variance.
                         */
                        let se = Math.sqrt(Math.abs(invXTX[i][i]));
                        
                        /** * ROBUSTNESS CHECK: Handle Singularity/NaN
                         * If SE is NaN or Infinite, we revert to a theoretical epsilon limit
                         * to represent a "Perfectly Collinear" state rather than breaking the report.
                         */
                        const isInvalid = isNaN(c) || isNaN(se) || !isFinite(se);
                        if (isInvalid) {
                            c = 0.000000; // Theoretical substitution for singular parameters
                            se = 0.000000;
                        }

                        const t = isInvalid ? 0 : c / (se || 1e-10);
                        const p = isInvalid ? 1.000 : getPValue(t) * 2;
                        const name = i === 0 ? "(Intercept)" : vars[xIs[i-1]];
                        
                        /** * METHOD: Variance Inflation Factor (VIF)
                         * VIF > 10 indicates severe multicollinearity affecting the stability of β.
                         */
                        let vif = "1.00";
                        if (i > 0) {
                            const varX = Math.pow(summary[i].stdDev, 2);
                            const calculatedVif = invXTX[i][i] * varX * (n - 1);
                            vif = isFinite(calculatedVif) ? calculatedVif.toFixed(2) : "∞";
                        }

                        return `
                        <tr>
                            <td>${name}</td>
                            <td>${isInvalid ? '<span class="warn">COLLINEAR</span>' : c.toFixed(6)}</td>
                            <td>${se.toFixed(6)}</td>
                            <td>${t.toFixed(3)}</td>
                            <td class="${p < 0.05 ? 'sig' : ''}">${p.toFixed(4)}</td>
                            <td class="${parseFloat(vif) > 10 ? 'warn' : ''}">${vif}</td>
                        </tr>`;
                    }).join('')}
                </table>

                <h2>Descriptive Statistics</h2>
                <table>
                    <tr><th>Variable</th><th>Mean (μ)</th><th>Std. Deviation (σ)</th><th>Variance (σ²)</th></tr>
                    ${summary.map(s => `
                        <tr>
                            <td>${s.name}</td>
                            <td>${s.mean.toFixed(4)}</td>
                            <td>${s.stdDev.toFixed(4)}</td>
                            <td>${Math.pow(s.stdDev, 2).toFixed(4)}</td>
                        </tr>
                    `).join('')}
                </table>

                <div class="note">
                    <strong>Statistical Notes:</strong><br>
                    1. <strong>P-Values:</strong> Calculated via Two-Tailed Standard Normal distribution approximation.<br>
                    2. <strong>VIF:</strong> Derived from the diagonal elements of the inverse correlation matrix.<br>
                    3. <strong>Robustness:</strong> Parameters marked 'COLLINEAR' were dropped or set to zero due to a Singular Information Matrix (det(X'X) ≈ 0).
                </div>
            </body></html>`;

        // Standard export logic follows...
        const filename = `REPORT_${Date.now()}.html`;
        const fh = await folderHandle.getFileHandle(filename, { create: true });
        const ws = await fh.createWritable();
        await ws.write(reportHTML);
        await ws.close();
        
        appendLog(`Report Auto-Saved: ${filename}`);
        const blob = new Blob([reportHTML], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        document.getElementById('report-link-container').innerHTML = 
            `<a href="${url}" download="${filename}" class="btn btn-gold" style="display:block; text-align:center; text-decoration:none">⬇ DOWNLOAD REPORT</a>`;
    }

    async function generateLogisticReport(vars, yI, xIs, coeffs, summary, n, invXTX) {
        const conf = document.getElementById('confLevel').value;
        
        /** * METHOD: Logistic Equation Construction
         * ASSUMPTION: Logit Link Function. ln(p/(1-p)) = Xb.
         */
        const equation = `ln(P / (1 - P)) = ${coeffs[0].toFixed(4)} + ` + 
            xIs.map((idx, i) => `${(coeffs[i+1] || 0).toFixed(4)}(${vars[idx]})`).join(' + ');

        const reportHTML = `
            <html><head><style>
                body { background: #0b0c10; color: white; font-family: monospace; padding: 40px; line-height: 1.4; }
                h1, h2 { color: #66fcf1; border-bottom: 2px solid #45a29e; font-variant: small-caps; }
                .eqn { background: #1f2833; padding: 25px; border-left: 5px solid #f2af29; font-size: 14px; margin: 25px 0; word-break: break-all; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
                th, td { border: 1px solid #45a29e; padding: 10px; text-align: left; }
                th { background: #000; color: #f2af29; }
                .sig { color: #66fcf1; font-weight: bold; }
                .warn { color: #ff4444; font-weight: bold; }
                .note { font-size: 10px; color: #888; margin-top: 15px; }
            </style></head><body>
                <h1>Logistic Analysis Results</h1>
                <div class="eqn"><strong>Logit Link Model:</strong><br>${equation}</div>
                <p>N: ${n} | Confidence: ${conf}% | Framework: Maximum Likelihood Estimation (MLE)</p>
                
                <h2>Coefficient Estimates & Odds Ratios</h2>
                <table>
                    <tr>
                        <th>Regressors</th>
                        <th>Log-Odds (β)</th>
                        <th>Odds Ratio (eᵝ)</th>
                        <th>Std. Error</th>
                        <th>Z-Stat</th>
                        <th>P-Value</th>
                        <th>VIF</th>
                    </tr>
                    ${coeffs.map((c, i) => {
                        /** * METHOD: Standard Error via Information Matrix
                         * SE is derived from the square root of the diagonal of the inverted Hessian (invXTX).
                         */
                        let se = Math.sqrt(Math.abs(invXTX[i][i]));
                        
                        const isInvalid = isNaN(c) || isNaN(se) || !isFinite(se);
                        if (isInvalid) { c = 0; se = 0; }

                        /** * METHOD: Odds Ratio Calculation
                         * Represents the effect of the variable on the probability of outcome = 1.
                         */
                        const oddsRatio = Math.exp(c);
                        const z = isInvalid ? 0 : c / (se || 1e-10);
                        const p = isInvalid ? 1.000 : getPValue(z) * 2;
                        const name = i === 0 ? "(Intercept)" : vars[xIs[i-1]];
                        
                        let vif = "1.00";
                        if (i > 0) {
                            const varX = Math.pow(summary[i].stdDev, 2);
                            const calculatedVif = invXTX[i][i] * varX * (n - 1);
                            vif = isFinite(calculatedVif) ? calculatedVif.toFixed(2) : "∞";
                        }

                        return `
                        <tr>
                            <td>${name}</td>
                            <td>${isInvalid ? '<span class="warn">COLLINEAR</span>' : c.toFixed(6)}</td>
                            <td>${isInvalid ? '--' : oddsRatio.toFixed(4)}</td>
                            <td>${se.toFixed(6)}</td>
                            <td>${z.toFixed(3)}</td>
                            <td class="${p < 0.05 ? 'sig' : ''}">${p.toFixed(4)}</td>
                            <td class="${parseFloat(vif) > 10 ? 'warn' : ''}">${vif}</td>
                        </tr>`;
                    }).join('')}
                </table>

                <h2>Model Diagnostics</h2>
                <div class="note">
                    <strong>Assumptions & Diagnostics:</strong><br>
                    1. <strong>MLE Estimation:</strong> Unlike OLS, these coefficients maximize the likelihood of the observed binary outcomes.<br>
                    2. <strong>Odds Ratio (OR):</strong> Values > 1 indicate an increase in likelihood of the dependent variable being 1; < 1 indicates a decrease.<br>
                    3. <strong>Z-Stat:</strong> Wald test statistic for individual coefficient significance.<br>
                    4. <strong>Independence:</strong> Errors are assumed to be independent; check for spatial or fractal autocorrelation in the MZMO stream if p-values are suspiciously low.
                </div>
            </body></html>`;

        const filename = `LOGISTIC_REPORT_${Date.now()}.html`;
        const fh = await folderHandle.getFileHandle(filename, { create: true });
        const ws = await fh.createWritable();
        await ws.write(reportHTML);
        await ws.close();
        
        appendLog(`Logistic Report Saved: ${filename}`);
        const blob = new Blob([reportHTML], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        document.getElementById('report-link-container').innerHTML = 
            `<a href="${url}" download="${filename}" class="btn btn-gold" style="display:block; text-align:center; text-decoration:none">⬇ DOWNLOAD LOGISTIC REPORT</a>`;
    }

    function addIMG() {
        canvas.toBlob((blob) => {
            const newUrl = URL.createObjectURL(blob);
            if (canvasIMG.src.startsWith('blob:')) {
                URL.revokeObjectURL(canvasIMG.src);
            }
            canvasIMG.src = newUrl;
        }, 'image/png');
    }

    function updateProgress(idx, startTime) {
        const elapsed = (Date.now() - startTime) / 1000;
        const avgTimePerDB = elapsed / (idx + 1);
        const remainingDBs = mzmoList.length - (idx + 1);
        const etaSeconds = Math.round(avgTimePerDB * remainingDBs);
        
        document.getElementById('glob-perc').innerText = Math.round(((idx + 1) / mzmoList.length) * 100) + "%";
        document.getElementById('eta-timer').innerText = new Date(etaSeconds * 1000).toISOString().substr(11, 8);
    }

    function bakeToken(data, val, x, y) {
        const buf = new ArrayBuffer(8);
        new DataView(buf).setFloat64(0, val, false);
        const bytes = new Uint8Array(buf);
        const p = (y * DIM + x) * 4;
        const p2 = (y * DIM + (x + 1)) * 4;
        const p3 = ((y + 1) * DIM + x) * 4;
        data[p]=bytes[0]; data[p+1]=bytes[1]; data[p+2]=bytes[2]; data[p+3]=255;
        data[p2]=bytes[3]; data[p2+1]=bytes[4]; data[p2+2]=bytes[5]; data[p2+3]=255;
        data[p3]=bytes[6]; data[p3+1]=bytes[7]; data[p3+2]=0; data[p3+3]=255;
    }
</script>
</body>
